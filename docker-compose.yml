services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:             # 🌟 1. เพิ่มบรรทัดนี้เพื่อเรียกใช้ไฟล์ .env ที่ซ่อน API Key ไว้
      - .env
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: uvicorn app:app --reload --host 0.0.0.0 --port 8000
    deploy:               # 🌟 2. เพิ่มบล็อกนี้เพื่อปลดล็อกพลังการ์ดจอ (GPU Passthrough)
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  traffic_db: